name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun test
      - run: bun test --reporter=junit --reporter-outfile=test-results.xml
        if: failure()
      - uses: dorny/test-reporter@v1
        if: failure()
        with:
          name: Test Results
          path: test-results.xml
          reporter: java-junit
      - run: bun build --compile src/index.tsx --outfile schmordle
